<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Scroll Shader reveal</title>
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body class="kzf-surface">
  <section class="kzf-shell kzf-surface">
    <div class="kzf-panel">
      <div class="kzf-panel-fill kzf-panel-fill--center">
        <div class="kzf-stack">
          <div class="kzf-col kzf-col--limit">
            <div class="kzf-gap kzf-gap--sm">
              <h2 class="kzf-title kzf-ink--bright">SCROLL DOWN</h2>
            </div>
            <p class="kzf-body kzf-ink--bright">AND see the magic</p>
            <a href="#" class="kzf-body">SEE MORE</a>
            <div class="kzf-iconbox"><img src="images/down-arrow.png" loading="lazy" alt="" /></div>
          </div>
        </div>
      </div>
    </div>
    <div class="kzf-gutter">
      <div class="kzf-bound">
        <div data-kzf-stage class="kzf-block"><img class="kzf-photo" src="images/scroll-1.jpg" alt=""
            sizes="(max-width: 736px) 100vw, 736px" data-kzf-tex loading="lazy"
            srcset="images/scroll-1-p500.jpg 500w, images/scroll-1.jpg 736w" />
        </div>
        <div data-kzf-stage class="kzf-block kzf-block--push"><img class="kzf-photo" src="images/scroll-2.jpg" alt=""
            sizes="(max-width: 736px) 100vw, 736px" data-kzf-tex loading="lazy"
            srcset="images/scroll-2-p500.jpg 500w, images/scroll-2.jpg 736w" />
        </div>
        <div data-kzf-stage class="kzf-block"><img class="kzf-photo" src="images/scroll-3.jpg" alt=""
            sizes="(max-width: 736px) 100vw, 736px" data-kzf-tex loading="lazy"
            srcset="images/scroll-3-p500.jpg 500w, images/scroll-3.jpg 736w" />
        </div>
      </div>
    </div>
    <div class="kzf-panel">
      <div class="kzf-panel-fill kzf-panel-fill--center">
        <div class="kzf-stack"><a href="#" class="kzf-body">SEE MORE</a>
          <div class="kzf-col kzf-col--limit">
            <div class="kzf-gap kzf-gap--sm">
              <h2 class="kzf-title kzf-ink--bright">THE END</h2>
            </div>
            <p class="kzf-body kzf-ink--accent">Thanks for scrolling — hope the reveal was worth the ride.</p>
          </div>
        </div>
      </div>
    </div>
  </section>
  <script src="script.js"></script>
</body>

</html>
