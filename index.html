<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Scroll Shader reveal</title>
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body class="kzf-surface">
  <section class="kzf-shell kzf-surface">
    <div class="kzf-panel">
      <div class="kzf-panel-fill kzf-panel-fill--center"></div>
    </div>
    <div class="kzf-gutter">
      <div class="kzf-bound">
        <div class="kzf-item">
          <div class="kzf-stage-head">
            <h3 class="kzf-stage-title">First reveal</h3>
            <p class="kzf-stage-desc">Warm gradient grid opens as you scroll past.</p>
          </div>
          <div data-kzf-stage class="kzf-block">
            <a class="kzf-stage-hit" href="#" aria-label="Open first image">
              <img class="kzf-photo" src="images/scroll-1.jpg" alt="First scroll image"
                sizes="(max-width: 736px) 100vw, 736px" data-kzf-tex loading="lazy"
                srcset="images/scroll-1-p500.jpg 500w, images/scroll-1.jpg 736w" />
            </a>
          </div>
        </div>
        <div class="kzf-item kzf-item--push">
          <div class="kzf-stage-head">
            <h3 class="kzf-stage-title">Offset frame</h3>
            <p class="kzf-stage-desc">Pushed right on wide layouts; centers on small screens.</p>
          </div>
          <div data-kzf-stage class="kzf-block">
            <a class="kzf-stage-hit" href="#" aria-label="Open second image">
              <img class="kzf-photo" src="images/scroll-2.jpg" alt="Second scroll image"
                sizes="(max-width: 736px) 100vw, 736px" data-kzf-tex loading="lazy"
                srcset="images/scroll-2-p500.jpg 500w, images/scroll-2.jpg 736w" />
            </a>
          </div>
        </div>
        <div class="kzf-item">
          <div class="kzf-stage-head">
            <h3 class="kzf-stage-title">Final pass</h3>
            <p class="kzf-stage-desc">Last tile completes the scroll story.</p>
          </div>
          <div data-kzf-stage class="kzf-block">
            <a class="kzf-stage-hit" href="#" aria-label="Open third image">
              <img class="kzf-photo" src="images/scroll-3.jpg" alt="Third scroll image"
                sizes="(max-width: 736px) 100vw, 736px" data-kzf-tex loading="lazy"
                srcset="images/scroll-3-p500.jpg 500w, images/scroll-3.jpg 736w" />
            </a>
          </div>
        </div>
      </div>
    </div>
  </section>
  <script src="script.js"></script>
</body>

</html>
